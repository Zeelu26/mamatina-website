# Render Blueprint for MaMaTina
#
# Deploy this by connecting your GitHub repo at https://render.com/
# and choosing "New + → Blueprint" — Render will detect this file.
#
# This setup uses a 1 GB persistent disk mounted at /var/data so that
# your products, photos, settings, and admin login survive deploys.
# To run on the FREE tier instead, change "plan: starter" to "plan: free"
# and DELETE the entire `disk:` block — but note that all your data
# (admin password, uploaded photos, products) will reset on every deploy.

services:
  - type: web
    name: mamatina
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
      - key: UPLOADS_DIR
        value: /var/data/uploads
    disk:
      name: mamatina-data
      mountPath: /var/data
      sizeGB: 1
