# Render Blueprint for MaMaTina — FREE TIER (no card required)
#
# Limitations of this configuration:
#   - The file system resets on every deploy or restart, so any products,
#     photos, settings, or admin password changes made through /admin will
#     revert to defaults on the next deploy.
#   - The service spins down after 15 minutes of inactivity; the first
#     request after that takes ~30 seconds to wake.
#
# This is perfect for client demos. When you're ready for a real launch,
# upgrade by changing `plan: free` to `plan: starter` and adding a disk
# block — see DEPLOY.md for the production config.

services:
  - type: web
    name: mamatina
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
